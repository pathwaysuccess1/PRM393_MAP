name: vietnam_chronogis
description: Vietnam ChronoGIS - Flutter Desktop App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.22.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  window_manager: ^0.3.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  dio: ^5.4.3
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  google_generative_ai: ^0.4.3
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  uuid: ^4.4.0
  path_provider: ^2.1.3
  path: ^1.9.0
  sqlite3: ^2.4.5
  url_launcher: ^6.2.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: any
  drift_dev: any
  freezed: any
  json_serializable: any
  riverpod_generator: any
  custom_lint: any
  riverpod_lint: any
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/geojson/
