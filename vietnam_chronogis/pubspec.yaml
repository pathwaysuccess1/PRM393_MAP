name: map_application1
description: "Vietnam ChronoGIS - Bản đồ lịch sử hành chính Việt Nam"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database
  drift: any
  path_provider: any
  path: any
  sqlite3_flutter_libs: any
  sqlite3: any

  # Navigation
  go_router: any

  # UI
  google_fonts: any
  flutter_riverpod: any
  riverpod_annotation: any
  shared_preferences: any

  # AI / API
  google_generative_ai: any
  dio: any

  # Models
  freezed_annotation: any
  json_annotation: ^4.12.0   # FIX: required by json_serializable at runtime

  # Map
  latlong2: any
  flutter_animate: any
  flutter_map: any

  # Utils
  intl: any
  window_manager: any
  uuid: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ===== CODE GENERATORS (root cause của 200+ lỗi import) =====
  build_runner: any          # runner chạy tất cả generators
  drift_dev: any             # generate *.g.dart cho Drift DAO/Database
  freezed: any               # generate *.freezed.dart cho @freezed models
  json_serializable: any     # generate *.g.dart cho @JsonSerializable
  riverpod_generator: any    # generate *.g.dart cho @riverpod providers

flutter:
  uses-material-design: true

  assets:
    - assets/geojson/          # Thêm asset folder cho gadm41_VNM_1.json